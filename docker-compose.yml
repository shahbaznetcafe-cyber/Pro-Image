services:
  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: development
      ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      SBZ_API_KEYS: dev-api-key-change-me
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      - backend
