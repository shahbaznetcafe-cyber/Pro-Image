services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: development
      ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      SBZ_API_KEYS: dev-api-key-change-me
      REDIS_URL: redis://redis:6379/0
      JOBS_OUTPUT_DIR: /data/jobs
    volumes:
      - job_storage:/data/jobs
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    command: ["arq", "app.worker.WorkerSettings"]
    environment:
      APP_ENV: development
      REDIS_URL: redis://redis:6379/0
      JOBS_OUTPUT_DIR: /data/jobs
    volumes:
      - job_storage:/data/jobs
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  job_storage:
